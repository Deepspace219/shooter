<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Horde Shooter - Auto Shoot</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        #gameCanvas {
            background: #222;
            border: 1px solid #fff;
        }
        #upgradeScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.199);
            color: white;
            padding: 25px;
            border-radius: 12px;
            display: none;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .upgradeOption {
            background: #444;
            padding: 12px;
            margin: 12px 0;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        .upgradeOption:hover {
            background: #666;
            transform: scale(1.05);
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0ff;
            font-weight: bold;
            text-shadow: 0 0 5px #000;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: red;
            padding: 20px;
            font-size: 36px;
            border-radius: 15px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="hud">
        Health: <span id="healthDisplay">3/3</span> | 
        Level: <span id="levelDisplay">1</span> | 
        XP: <span id="xpDisplay">0/10</span>
    </div>
    <div id="upgradeScreen">
        <h2 style="color: #0f0;">LEVEL UP!</h2>
        <p>Choose an upgrade:</p>
        <div id="options"></div>
    </div>
    <div id="gameOver">
        <h1>GAME OVER</h1>
        <p>Final Level: <span id="finalLevel"></span></p>
        <button onclick="location.reload()" style="padding:10px 20px; font-size:18px; margin-top:10px;">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const upgradeScreen = document.getElementById('upgradeScreen');
        const optionsDiv = document.getElementById('options');
        const healthDisplay = document.getElementById('healthDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const xpDisplay = document.getElementById('xpDisplay');
        const gameOverScreen = document.getElementById('gameOver');
        const finalLevel = document.getElementById('finalLevel');

        // Game constants
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;
        const PLAYER_SIZE = 20;
        const ENEMY_SIZE = 15;
        const BULLET_SIZE = 5;
        const ENEMY_SPEED = 1.2;
        const PLAYER_BASE_SPEED = 3;
        const BASE_FIRE_RATE = 300; // ms between shots (auto-fire)
        const BASE_BULLET_SPEED = 6;
        const BASE_DAMAGE = 1;
        const ENEMY_HEALTH = 3;
        const BULLET_HEALTH = 1;
        const XP_PER_ENEMY = 1;
        const XP_TO_LEVEL_BASE = 2;
        const ENEMY_SPAWN_RATE_BASE = 1000;
        const ENEMY_FIRE_RATE = 2000;

        // Upgrades
        const upgrades = {
            Damage: { level: 0, desc: 'Increases bullet damage' },
            Speed: { level: 0, desc: 'Increases bullet speed' },
            Bullets: { level: 0, desc: 'Fires more bullets per shot' },
            'Fire Rate': { level: 0, desc: 'Faster shooting' },
            'Big Boy': { level: 0, desc: 'Bigger bullets, bigger hitbox, slower speed' },
            Block: { level: 0, desc: 'Orbiting shield blocks bullets' },
            Homing: { level: 0, desc: 'Bullets track enemies' },
            Ricoche: { level: 0, desc: 'Bullets bounce off walls/enemies' },
            Explosive: { level: 0, desc: 'Bullets explode on hit' },
            Health: { level: 0, desc: 'More health + regen' },
            Movement: { level: 0, desc: 'Move faster' },
            'Death Ring': { level: 0, desc: 'Damages enemies near you' },
            'Radial Shot': { level: 0, desc: 'Shoots in all directions' },
            Blackhole: { level: 0, desc: 'Shoots black holes that suck & damage' },
            'ICE Bullets': { level: 0, desc: 'Slows enemies on hit' }
        };

        // Game state
        let player = {
            x: WIDTH / 2,
            y: HEIGHT / 2,
            size: PLAYER_SIZE,
            health: 3,
            maxHealth: 3,
            speed: PLAYER_BASE_SPEED,
            lastShot: 0,
            regenTimer: 0,
            blockAngle: 0
        };
        let enemies = [];
        let playerBullets = [];
        let enemyBullets = [];
        let blackholes = [];
        let keys = {};
        let mouse = { x: WIDTH / 2, y: HEIGHT / 2 };
        let gameOver = false;
        let paused = false;
        let level = 1;
        let xp = 0;
        let lastSpawn = 0;
        let lastAutoShot = 0;

        // Input
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        // Auto-shoot function
        function autoShoot() {
            if (gameOver || paused || enemies.length === 0) return;
            const now = Date.now();
            const fireRate = BASE_FIRE_RATE / (1 + upgrades['Fire Rate'].level * 0.3);
            if (now - lastAutoShot < fireRate) return;

            lastAutoShot = now;
            const dx = mouse.x - player.x;
            const dy = mouse.y - player.y;
            const dist = Math.hypot(dx, dy) || 1;
            const bulletsPerShot = 1 + upgrades.Bullets.level;
            const spread = bulletsPerShot > 1 ? Math.PI / 8 : 0;

            for (let i = 0; i < bulletsPerShot; i++) {
                const offset = (i - (bulletsPerShot - 1) / 2) * spread / Math.max(1, bulletsPerShot - 1);
                const velX = (dx / dist) * getBulletSpeed();
                const velY = (dy / dist) * getBulletSpeed();
                const angle = Math.atan2(velY, velX) + offset;
                playerBullets.push({
                    x: player.x,
                    y: player.y,
                    velX: Math.cos(angle) * getBulletSpeed(),
                    velY: Math.sin(angle) * getBulletSpeed(),
                    size: getBulletSize(),
                    bounces: upgrades.Ricoche.level,
                    health: 1
                });
            }

            // Radial Shot
            if (upgrades['Radial Shot'].level > 0) {
                const count = 6 + upgrades['Radial Shot'].level * 2;
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    playerBullets.push({
                        x: player.x,
                        y: player.y,
                        velX: Math.cos(angle) * getBulletSpeed() * 0.7,
                        velY: Math.sin(angle) * getBulletSpeed() * 0.7,
                        size: getBulletSize() * 0.7,
                        bounces: 0,
                        health: 1
                    });
                }
            }

            // Blackhole
            if (upgrades.Blackhole.level > 0 && Math.random() < 0.15) {
                const angle = Math.atan2(dy, dx);
                blackholes.push({
                    x: player.x + Math.cos(angle) * 80,
                    y: player.y + Math.sin(angle) * 80,
                    radius: 40 + upgrades.Blackhole.level * 12,
                    life: 4000 + upgrades.Blackhole.level * 800
                });
            }
        }

        function getBulletSpeed() {
            return BASE_BULLET_SPEED + upgrades.Speed.level * 1.2 - upgrades['Big Boy'].level * 0.6;
        }

        function getBulletSize() {
            return BULLET_SIZE + upgrades['Big Boy'].level * 2.5;
        }

        function getDamage() {
            return BASE_DAMAGE + upgrades.Damage.level * 0.6;
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y;
            if (side === 0) { x = Math.random() * WIDTH; y = -ENEMY_SIZE; }
            else if (side === 1) { x = Math.random() * WIDTH; y = HEIGHT + ENEMY_SIZE; }
            else if (side === 2) { x = -ENEMY_SIZE; y = Math.random() * HEIGHT; }
            else { x = WIDTH + ENEMY_SIZE; y = Math.random() * HEIGHT; }
            enemies.push({
                x, y,
                size: ENEMY_SIZE,
                health: ENEMY_HEALTH,
                lastShot: Date.now() + Math.random() * ENEMY_FIRE_RATE,
                slowTimer: 0
            });
        }

        function update() {
            if (gameOver || paused) return;

            // Auto-shoot
            autoShoot();

            // Player movement
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;
            player.x = Math.max(player.size, Math.min(WIDTH - player.size, player.x));
            player.y = Math.max(player.size, Math.min(HEIGHT - player.size, player.y));
            player.speed = PLAYER_BASE_SPEED + upgrades.Movement.level * 0.6;

            // Regen
            if (upgrades.Health.level > 0) {
                player.regenTimer += 16;
                const regenRate = 2000 / (1 + upgrades.Health.level * 0.5);
                if (player.regenTimer > regenRate && player.health < player.maxHealth) {
                    player.health = Math.min(player.maxHealth, player.health + 0.2);
                    player.regenTimer = 0;
                }
            }

            // Block orbit
            if (upgrades.Block.level > 0) {
                player.blockAngle += 0.06 + upgrades.Block.level * 0.03;
            }

            // Spawn enemies
            const now = Date.now();
            const spawnRate = ENEMY_SPAWN_RATE_BASE / (1 + level * 0.1);
            if (now - lastSpawn > spawnRate) {
                spawnEnemy();
                lastSpawn = now;
            }

            // Update enemies
            enemies.forEach((e, i) => {
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const dist = Math.hypot(dx, dy) || 1;
                const speed = ENEMY_SPEED * (e.slowTimer > 0 ? 0.4 : 1);
                e.x += (dx / dist) * speed;
                e.y += (dy / dist) * speed;

                // Enemy shoot
                if (now - e.lastShot > ENEMY_FIRE_RATE) {
                    const velX = (dx / dist) * 3;
                    const velY = (dy / dist) * 3;
                    enemyBullets.push({
                        x: e.x,
                        y: e.y,
                        velX, velY,
                        size: BULLET_SIZE,
                        health: BULLET_HEALTH,
                        slowTimer: 0
                    });
                    e.lastShot = now;
                }

                // Death Ring
                if (upgrades['Death Ring'].level > 0) {
                    const ringDist = Math.hypot(player.x - e.x, player.y - e.y);
                    const ringRadius = 55 + upgrades['Death Ring'].level * 12;
                    if (ringDist < ringRadius) {
                        e.health -= 0.02 * upgrades['Death Ring'].level;
                    }
                }

                if (e.slowTimer > 0) e.slowTimer--;
                if (e.health <= 0) {
                    enemies.splice(i, 1);
                    xp += XP_PER_ENEMY;
                    checkLevelUp();
                }
            });

            // Player bullets
            playerBullets.forEach((b, i) => {
                b.x += b.velX;
                b.y += b.velY;

                // Homing
                if (upgrades.Homing.level > 0) {
                    let closest = null, minDist = 300;
                    enemies.forEach(e => {
                        const d = Math.hypot(e.x - b.x, e.y - b.y);
                        if (d < minDist) { minDist = d; closest = e; }
                    });
                    if (closest) {
                        const tx = closest.x - b.x;
                        const ty = closest.y - b.y;
                        const dist = Math.hypot(tx, ty);
                        const strength = 0.08 + upgrades.Homing.level * 0.06;
                        b.velX += (tx / dist) * strength;
                        b.velY += (ty / dist) * strength;
                        const speed = Math.hypot(b.velX, b.velY);
                        b.velX = (b.velX / speed) * getBulletSpeed();
                        b.velY = (b.velY / speed) * getBulletSpeed();
                    }
                }

                // Bounce
                let bounced = false;
                if (b.x < 0 || b.x > WIDTH || b.y < 0 || b.y > HEIGHT) {
                    if (b.bounces > 0) {
                        b.bounces--;
                        if (b.x < 0 || b.x > WIDTH) b.velX = -b.velX;
                        if (b.y < 0 || b.y > HEIGHT) b.velY = -b.velY;
                        bounced = true;
                    } else {
                        playerBullets.splice(i, 1);
                        return;
                    }
                }

                // Hit enemies
                enemies.forEach((e, j) => {
                    if (Math.hypot(b.x - e.x, b.y - e.y) < b.size + e.size) {
                        e.health -= getDamage();
                        if (upgrades['ICE Bullets'].level > 0) {
                            e.slowTimer = Math.max(e.slowTimer, 90 + upgrades['ICE Bullets'].level * 30);
                        }

                        // Explosive
                        if (upgrades.Explosive.level > 0) {
                            const radius = 45 + upgrades.Explosive.level * 15;
                            enemies.forEach((o, k) => {
                                if (k !== j && Math.hypot(b.x - o.x, b.y - o.y) < radius) {
                                    o.health -= getDamage() * 0.6;
                                }
                            });
                            enemyBullets.forEach((eb, m) => {
                                if (Math.hypot(b.x - eb.x, b.y - eb.y) < radius) {
                                    eb.health -= getDamage();
                                    if (eb.health <= 0) enemyBullets.splice(m, 1);
                                }
                            });
                        }

                        if (b.bounces > 0 && !bounced) {
                            b.bounces--;
                            const dx = b.x - e.x;
                            const dy = b.y - e.y;
                            const dist = Math.hypot(dx, dy);
                            const nx = dx / dist, ny = dy / dist;
                            const dot = b.velX * nx + b.velY * ny;
                            b.velX -= 2 * dot * nx;
                            b.velY -= 2 * dot * ny;
                        } else {
                            playerBullets.splice(i, 1);
                        }
                    }
                });

                // Hit enemy bullets
                enemyBullets.forEach((eb, j) => {
                    if (Math.hypot(b.x - eb.x, b.y - eb.y) < b.size + eb.size) {
                        eb.health -= getDamage();
                        if (eb.health <= 0) enemyBullets.splice(j, 1);
                        if (b.bounces === 0) playerBullets.splice(i, 1);
                    }
                });
            });

            // Enemy bullets
            enemyBullets.forEach((b, i) => {
                b.x += b.velX;
                b.y += b.velY;
                if (b.x < 0 || b.x > WIDTH || b.y < 0 || b.y > HEIGHT) {
                    enemyBullets.splice(i, 1);
                    return;
                }
                if (b.slowTimer > 0) { b.velX *= 0.97; b.velY *= 0.97; b.slowTimer--; }

                // Block?
                let blocked = false;
                if (upgrades.Block.level > 0) {
                    const bx = player.x + Math.cos(player.blockAngle) * 35;
                    const by = player.y + Math.sin(player.blockAngle) * 35;
                    if (Math.hypot(b.x - bx, b.y - by) < 12 + upgrades.Block.level * 3) {
                        blocked = true;
                        enemyBullets.splice(i, 1);
                    }
                }
                if (!blocked && Math.hypot(b.x - player.x, b.y - player.y) < b.size + player.size) {
                    player.health -= 1;
                    enemyBullets.splice(i, 1);
                    if (player.health <= 0) endGame();
                }

                // Death Ring on bullets
                if (upgrades['Death Ring'].level > 0) {
                    const ringDist = Math.hypot(player.x - b.x, player.y - b.y);
                    if (ringDist < 55 + upgrades['Death Ring'].level * 12) {
                        b.health -= 0.03 * upgrades['Death Ring'].level;
                        if (b.health <= 0) enemyBullets.splice(i, 1);
                    }
                }
            });

            // Blackholes
            blackholes.forEach((bh, i) => {
                bh.life -= 16;
                if (bh.life <= 0) { blackholes.splice(i, 1); return; }
                enemies.forEach(e => {
                    const dx = bh.x - e.x;
                    const dy = bh.y - e.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < bh.radius) {
                        const pull = (1 - dist / bh.radius) * 1.2;
                        e.x += (dx / dist) * pull;
                        e.y += (dy / dist) * pull;
                        e.health -= 0.02 * upgrades.Blackhole.level;
                    }
                });
            });

            // HUD
            healthDisplay.textContent = `${player.health.toFixed(1)}/${player.maxHealth}`;
            levelDisplay.textContent = level;
            const xpNeeded = XP_TO_LEVEL_BASE * level;
            xpDisplay.textContent = `${xp}/${xpNeeded}`;
        }

        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Death Ring
            if (upgrades['Death Ring'].level > 0) {
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.6)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 55 + upgrades['Death Ring'].level * 12, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Player
            ctx.fillStyle = '#00f';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();

            // Block
            if (upgrades.Block.level > 0) {
                ctx.fillStyle = '#888';
                const bx = player.x + Math.cos(player.blockAngle) * 35;
                const by = player.y + Math.sin(player.blockAngle) * 35;
                ctx.beginPath();
                ctx.arc(bx, by, 12 + upgrades.Block.level * 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Enemies
            ctx.fillStyle = '#f00';
            enemies.forEach(e => {
                ctx.globalAlpha = e.slowTimer > 0 ? 0.7 : 1;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            // Player bullets
            ctx.fillStyle = '#000';
            playerBullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Enemy bullets
            ctx.fillStyle = '#f80';
            enemyBullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Blackholes
            ctx.fillStyle = '#30f';
            blackholes.forEach(bh => {
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.arc(bh.x, bh.y, bh.radius / 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });
        }

        function checkLevelUp() {
            const needed = XP_TO_LEVEL_BASE * level;
            if (xp >= needed) {
                xp -= needed;
                level++;
                paused = true;
                showUpgrades();
                player.maxHealth = 3 + upgrades.Health.level;
                player.health = player.maxHealth;
            }
        }

        function showUpgrades() {
            upgradeScreen.style.display = 'block';
            optionsDiv.innerHTML = '';
            const keys = Object.keys(upgrades);
            const chosen = [];
            while (chosen.length < 3) {
                const r = keys[Math.floor(Math.random() * keys.length)];
                if (!chosen.includes(r)) chosen.push(r);
            }
            chosen.forEach(name => {
                const div = document.createElement('div');
                div.className = 'upgradeOption';
                div.innerHTML = `<strong>${name}</strong> (Lv. ${upgrades[name].level + 1})<br><small>${upgrades[name].desc}</small>`;
                div.onclick = () => {
                    upgrades[name].level++;
                    upgradeScreen.style.display = 'none';
                    paused = false;
                };
                optionsDiv.appendChild(div);
            });
        }

        function endGame() {
            gameOver = true;
            gameOverScreen.style.display = 'block';
            finalLevel.textContent = level;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start
        player.maxHealth = 3 + upgrades.Health.level;
        player.health = player.maxHealth;
        gameLoop();
    </script>
</body>
</html>
